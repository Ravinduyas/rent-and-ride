<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A2B47"/>
      <stop offset="60%" stop-color="#0B1426"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </radialGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#C7CBD3"/>
      <stop offset="100%" stop-color="#8A8F9B"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>

  <!-- outer silver ring -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="url(#silver)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="url(#silver)" stroke-width="0.8" opacity="0.35"/>

  <!-- R&R monogram -->
  <g fill="url(#silver)" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="128" y="128" font-size="78" text-anchor="middle" letter-spacing="-2">R&#38;R</text>
  </g>

  <!-- divider -->
  <path d="M 70 152 L 186 152" stroke="url(#silver)" stroke-width="0.8" opacity="0.5"/>

  <!-- Rent & Ride -->
  <text x="128" y="178" fill="url(#silver)" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="600" text-anchor="middle" letter-spacing="1">Rent &amp; Ride</text>

  <!-- Weligama -->
  <text x="128" y="202" fill="url(#silver)" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="16" text-anchor="middle" opacity="0.9">Weligama</text>

  <!-- palm accent -->
  <g stroke="url(#silver)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 175 205 Q 175 192 175 184"/>
    <path d="M 175 188 Q 168 184 162 186"/>
    <path d="M 175 188 Q 182 184 188 186"/>
    <path d="M 175 188 Q 172 182 168 178"/>
    <path d="M 175 188 Q 178 182 182 178"/>
  </g>

  <!-- wave -->
  <path d="M 80 215 Q 100 210 120 215 T 160 215 T 200 215" stroke="url(#silver)" stroke-width="1.2" fill="none" opacity="0.7"/>
</svg>
